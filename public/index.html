<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskKu — Daftar Tugas Kuliah</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Plus Jakarta Sans', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      }
    }

<style>
  body { background-color: #faf7f0; font-family: 'Plus Jakarta Sans', sans-serif; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4cfc9; border-radius: 8px; }

  /* Checkbox */
  .custom-check {
    appearance: none; -webkit-appearance: none;
    width: 22px; height: 22px;
    border: 2px solid #d4cfc9; border-radius: 6px;
    cursor: pointer; flex-shrink: 0;
    transition: all 0.18s ease;
    position: relative; background: white;
    display: grid; place-content: center;
  }
  .custom-check::after {
    content: ''; width: 5px; height: 9px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0; transition: opacity 0.15s ease;
  }
  .custom-check:checked { background: #3d8b5e; border-color: #3d8b5e; }
  .custom-check:checked::after { opacity: 1; }
  .custom-check:hover:not(:checked) { border-color: #4fa873; background: #f0faf4; }

  /* Animations */
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake   {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(61,139,94,0.4); }
    70%  { box-shadow: 0 0 0 10px rgba(61,139,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(61,139,94,0); }
  }

  .animate-slide-in { animation: slideIn 0.28s ease; }
  .animate-fade-in  { animation: fadeIn 0.3s ease; }
  .animate-fade-up  { animation: fadeUp 0.4s ease both; }
  .spin { animation: spin 0.7s linear infinite; }

  .progress-fill { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  input:focus, select:focus { outline: none; }
  .text-done { text-decoration: line-through; color: #b0a9a1; }

  .filter-active {
    background: #e8f5ee !important;
    border-color: #3d8b5e !important;
    color: #3d8b5e !important;
    font-weight: 600;
  }
  .no-scroll::-webkit-scrollbar { display: none; }
  .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

  .mk-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .removing {
    opacity: 0 !important; transform: translateX(16px) !important;
    transition: all 0.2s ease !important;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1714; color: white;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    padding: 10px 20px; border-radius: 99px;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0; z-index: 200; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Login page */
  #login-page {
    position: fixed; inset: 0; z-index: 100;
    background: #faf7f0;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: white; border: 1px solid #ede8df;
    border-radius: 24px; padding: 40px 36px;
    width: 100%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    animation: fadeUp 0.4s ease both;
  }

  /* Password toggle */
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #a09a94; padding: 4px;
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: #3d8b5e; }

  /* Avatar / user badge */
  .user-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #e8f5ee; border-radius: 99px;
    padding: 5px 12px 5px 6px;

    background: #3d8b5e;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
    flex-shrink: 0;
    animation: pulse-ring 2s ease infinite;
  }
</style>
</head>

<script>
// ═══════════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════════

const SESSION_KEY = 'taskku_token';
const USERNAME_KEY = 'taskku_user';

function getToken()    { return sessionStorage.getItem(SESSION_KEY); }
function getUsername() { return sessionStorage.getItem(USERNAME_KEY); }

function saveSession(token, username) {
  sessionStorage.setItem(SESSION_KEY, token);
  sessionStorage.setItem(USERNAME_KEY, username);
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(USERNAME_KEY);
}

// ═══════════════════════════════════════════
//  API
// ═══════════════════════════════════════════

async function apiFetch(url, options = {}) {
  const token = getToken();
  const res = await fetch(url, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    ...options,
  });

  // Session expired
  if (res.status === 401 && !url.startsWith('/api/auth/')) {
    clearSession();
    showLogin();
    showToast('⏱ Sesi kamu sudah berakhir, silakan login ulang', true);
    throw new Error('Unauthorized');
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ═══════════════════════════════════════════
//  LOGIN / REGISTER / LOGOUT
// ═══════════════════════════════════════════

let authMode = 'login'; // 'login' | 'register'

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  const isRegister = authMode === 'register';

  document.getElementById('auth-subtitle').textContent     = isRegister ? 'Buat akun baru' : 'Masuk untuk melihat tugasmu';
  document.getElementById('btn-login').textContent         = isRegister ? 'Daftar' : 'Masuk';
  document.getElementById('auth-toggle-text').textContent  = isRegister ? 'Sudah punya akun?' : 'Belum punya akun?';
  document.getElementById('auth-toggle-btn').textContent   = isRegister ? 'Masuk di sini' : 'Daftar sekarang';
  document.getElementById('register-confirm-wrap').classList.toggle('hidden', !isRegister);
  document.getElementById('login-error').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('register-confirm').value = '';
}

function showLogin() {
  authMode = 'login';
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('app-page').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('register-confirm').value = '';
  document.getElementById('login-error').classList.add('hidden');
  document.getElementById('register-confirm-wrap').classList.add('hidden');
  document.getElementById('btn-login').textContent = 'Masuk';
  document.getElementById('auth-subtitle').textContent = 'Masuk untuk melihat tugasmu';
  document.getElementById('auth-toggle-text').textContent = 'Belum punya akun?';
  document.getElementById('auth-toggle-btn').textContent = 'Daftar sekarang';
}

function showApp(username) {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app-page').classList.remove('hidden');
  const initial = username.charAt(0).toUpperCase();
  document.getElementById('user-avatar').textContent = initial;
  document.getElementById('user-name').textContent = username;
}

// Hash password pakai Web Crypto API (built-in browser, tanpa library)
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// Dipanggil tombol submit — otomatis pilih login atau register
function doSubmitAuth() {
  if (authMode === 'register') doRegister();
  else doLogin();
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('btn-login');

  if (!username || !password) {
    errEl.textContent = 'Username dan password wajib diisi';
    errEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10"/></svg> Masuk...`;
  errEl.classList.add('hidden');

  try {
    const passwordHash = await sha256(password);
    const data = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username, passwordHash }),
    });
    saveSession(data.token, data.username);
    showApp(data.username);
    loadTasks();
  } catch (e) {
    errEl.textContent = e.message.includes('401') || e.message.includes('salah')
      ? 'Username atau password salah'
      : 'Gagal login: ' + e.message;
    errEl.classList.remove('hidden');
    const pwEl = document.getElementById('login-password');
    pwEl.style.animation = 'shake 0.3s ease';
    pwEl.style.borderColor = '#f87171';
    setTimeout(() => { pwEl.style.animation = ''; pwEl.style.borderColor = '#e8e3da'; }, 400);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
}

async function doRegister() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const confirm  = document.getElementById('register-confirm').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('btn-login');

  errEl.classList.add('hidden');

  if (!username || !password || !confirm) {
    errEl.textContent = 'Semua field wajib diisi';
    errEl.classList.remove('hidden'); return;
  }
  if (!/^[a-z0-9_]{3,20}$/.test(username)) {
    errEl.textContent = 'Username: huruf kecil, angka, underscore (3-20 karakter)';
    errEl.classList.remove('hidden'); return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Password minimal 6 karakter';
    errEl.classList.remove('hidden'); return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Password dan konfirmasi tidak sama';
    errEl.classList.remove('hidden');
    document.getElementById('register-confirm').style.borderColor = '#f87171';
    setTimeout(() => document.getElementById('register-confirm').style.borderColor = '#e8e3da', 1500);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10"/></svg> Mendaftar...`;

  try {
    const passwordHash = await sha256(password);
    await apiFetch('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({ username, passwordHash }),
    });
    // Auto login setelah register berhasil
    const data = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username, passwordHash }),
    });
    saveSession(data.token, data.username);
    showApp(data.username);
    loadTasks();
    showToast('🎉 Akun berhasil dibuat, selamat datang!');
  } catch (e) {
    errEl.textContent = e.message.includes('sudah dipakai')
      ? 'Username sudah dipakai, coba yang lain'
      : 'Gagal daftar: ' + e.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Daftar';
  }
}

async function doLogout() {
  try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch {}
  clearSession();
  tasks = [];
  showLogin();
  showToast('👋 Sampai jumpa!');
}

function togglePw() {
  const input   = document.getElementById('login-password');
  const eyeShow = document.getElementById('eye-show');
  const eyeHide = document.getElementById('eye-hide');
  if (input.type === 'password') {
    input.type = 'text';
    eyeShow.style.display = 'none';
    eyeHide.style.display = 'block';
  } else {
    input.type = 'password';
    eyeShow.style.display = 'block';
    eyeHide.style.display = 'none';
  }
}

// ═══════════════════════════════════════════
//  TASKS STATE
// ═══════════════════════════════════════════

let tasks = [];
let currentFilter = 'all';

// ─── Matkul colors ────────────────────────
const matkulColorMap = {};
const palette = [
  { bg:'#eff6ff', text:'#3b82f6', dot:'#3b82f6' },
  { bg:'#fef3c7', text:'#d97706', dot:'#f59e0b' },
  { bg:'#f3e8ff', text:'#9333ea', dot:'#a855f7' },
  { bg:'#fee2e2', text:'#e05252', dot:'#f87171' },
  { bg:'#ccfbf1', text:'#0d9488', dot:'#14b8a6' },
  { bg:'#ffedd5', text:'#ea580c', dot:'#f97316' },
  { bg:'#e0e7ff', text:'#4f46e5', dot:'#6366f1' },
  { bg:'#fce7f3', text:'#db2777', dot:'#ec4899' },
  { bg:'#dcfce7', text:'#16a34a', dot:'#22c55e' },
  { bg:'#fefce8', text:'#ca8a04', dot:'#eab308' },
];
let pIdx = 0;

function getMkColor(matkul) {
  const key = matkul.trim().toLowerCase();
  if (!matkulColorMap[key]) { matkulColorMap[key] = palette[pIdx++ % palette.length]; }
  return matkulColorMap[key];
}

// ─── Toast ────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#e05252' : '#1a1714';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── Load ─────────────────────────────────
async function loadTasks() {
  try {
    const data = await apiFetch('/api/tasks');
    tasks = data;
    tasks.forEach(t => { if (t.matkul) getMkColor(t.matkul); });
    render();
  } catch (e) {
    if (e.message !== 'Unauthorized') {
      document.getElementById('task-list').innerHTML = `
        <div class="bg-white rounded-2xl border py-12 text-center" style="border-color:#ede8df">
          <div style="font-size:2.5rem" class="mb-3">⚠️</div>
          <div class="text-sm font-semibold" style="color:#7a7470">Gagal memuat tugas</div>
          <div class="font-mono text-xs mt-1" style="color:#c4bfba">${e.message}</div>
        </div>`;
    }
  }
}

// ─── Add ──────────────────────────────────
async function addTask() {
  const name     = document.getElementById('input-name').value.trim();
  const matkul   = document.getElementById('input-matkul').value.trim();
  const deadline = document.getElementById('input-date').value;
  const priority = document.getElementById('input-priority').value;

  if (!name)   { shakeInput('input-name');   return; }
  if (!matkul) { shakeInput('input-matkul'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.innerHTML = `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10"/></svg> Menyimpan...`;

  try {
    const task = await apiFetch('/api/tasks', {
      method: 'POST',
      body: JSON.stringify({ name, matkul, deadline, priority }),
    });
    getMkColor(matkul);
    tasks.unshift(task);
    document.getElementById('input-name').value    = '';
    document.getElementById('input-matkul').value  = '';
    document.getElementById('input-date').value    = '';
    document.getElementById('input-priority').value = 'normal';
    render();
    showToast('✅ Tugas berhasil ditambahkan!');
  } catch (e) {
    if (e.message !== 'Unauthorized') showToast('❌ Gagal: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v13M1 7.5h13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Tambah Tugas`;
  }
}

// ─── Toggle Done ──────────────────────────
async function toggleDone(id) {
  const t = tasks.find(t => String(t.id) === id);
  if (!t) return;
  const newDone = !t.done;
  t.done = newDone;
  updateCardDOM(t);
  updateStats();
  try {
    await apiFetch(`/api/tasks/${id}`, { method:'PUT', body: JSON.stringify({ done: newDone }) });
    showToast(newDone ? '✅ Tugas selesai!' : '↩️ Tandai belum selesai');
  } catch (e) {
    t.done = !newDone;
    updateCardDOM(t);
    updateStats();
    if (e.message !== 'Unauthorized') showToast('❌ Gagal: ' + e.message, true);
  }
}

function updateCardDOM(t) {
  const card = document.getElementById('task-' + t.id);
  if (!card) { render(); return; }
  card.style.opacity = t.done ? '0.6' : '1';
  const cb = card.querySelector('.custom-check');
  if (cb) cb.checked = t.done;
  const nameEl = card.querySelector('.task-name-text');
  if (nameEl) {
    nameEl.classList.toggle('text-done', t.done);
    nameEl.style.color = t.done ? '' : '#1a1714';
  }
  const chipWrap = card.querySelector('.task-chips');
  if (chipWrap) chipWrap.innerHTML = buildChips(t);
  const dl = daysLeft(t.deadline);
  const isOverdue = !t.done && t.deadline && dl < 0;
  const isSoon    = !t.done && t.deadline && dl !== null && dl >= 0 && dl <= 2;
  let borderColor = '#ede8df';
  if (isOverdue) borderColor = '#fca5a5';
  else if (isSoon) borderColor = '#fcd34d';
  card.style.borderColor = borderColor;
}

function updateStats() {
  const total   = tasks.length;
  const done    = tasks.filter(t => t.done).length;
  const overdue = tasks.filter(t => !t.done && t.deadline && daysLeft(t.deadline) < 0).length;
  const pct     = total ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-done').textContent    = done;
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ─── Delete ───────────────────────────────
async function deleteTask(id) {
  const el = document.getElementById('task-' + id);
  if (el) el.classList.add('removing');
  await new Promise(r => setTimeout(r, 210));
  try {
    await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
    tasks = tasks.filter(t => String(t.id) !== id);
    render();
    showToast('🗑 Tugas dihapus');
  } catch (e) {
    render();
    if (e.message !== 'Unauthorized') showToast('❌ Gagal hapus: ' + e.message, true);
  }
}

// ─── Clear done ───────────────────────────
async function clearDone() {
  const doneCount = tasks.filter(t => t.done).length;
  if (!doneCount) { showToast('Tidak ada tugas selesai'); return; }
  if (!confirm(`Hapus ${doneCount} tugas yang sudah selesai?`)) return;
  try {
    await apiFetch('/api/tasks/done', { method: 'DELETE' });
    tasks = tasks.filter(t => !t.done);
    render();
    showToast(`🗑 ${doneCount} tugas selesai dihapus`);
  } catch (e) {
    if (e.message !== 'Unauthorized') showToast('❌ Gagal: ' + e.message, true);
  }
}

// ─── Filter ───────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
  btn.classList.add('filter-active');
  render();
}

// ─── Helpers ──────────────────────────────
function daysLeft(deadline) {
  if (!deadline) return null;
  const diff = new Date(deadline + 'T00:00:00') - new Date(new Date().toDateString());
  return Math.ceil(diff / 86400000);
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function shakeInput(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#f87171'; el.style.background = '#fff5f5';
  el.style.animation = 'shake 0.3s ease'; el.focus();
  setTimeout(() => { el.style.animation=''; el.style.borderColor='#e8e3da'; el.style.background='#faf7f0'; }, 500);
}

// ─── Build chips ──────────────────────────
function buildChips(t) {
  const dl = daysLeft(t.deadline);
  const isOverdue = !t.done && t.deadline && dl < 0;
  const isSoon    = !t.done && t.deadline && dl !== null && dl >= 0 && dl <= 2;
  let dlChip = '';
  if (t.deadline) {
    let chipBg = '#f5f0e8', chipColor = '#7a7470', icon = '📅', extra = '';
    if (t.done)         { chipBg='#e8f5ee'; chipColor='#3d8b5e'; icon='✓ '; }
    else if (isOverdue) { chipBg='#fee2e2'; chipColor='#e05252'; icon='⚠️ '; extra=` · ${Math.abs(dl)} hari lalu`; }
    else if (dl === 0)  { chipBg='#fef3c7'; chipColor='#d97706'; icon='⏰ '; extra=' · Hari ini!'; }
    else if (isSoon)    { chipBg='#fef3c7'; chipColor='#d97706'; icon='⏰ '; extra=` · ${dl} hari lagi`; }
    else if (dl !== null) { extra = ` · ${dl} hari lagi`; }
    dlChip = `<span class="font-mono text-xs px-2.5 py-1 rounded-lg" style="background:${chipBg};color:${chipColor}">${icon}${formatDate(t.deadline)}${extra}</span>`;
  }
  let prioChip = '';
  if (!t.done && t.priority === 'high') prioChip = `<span class="font-mono text-xs px-2.5 py-1 rounded-lg" style="background:#fef3c7;color:#d97706">🔥 Tinggi</span>`;
  if (!t.done && t.priority === 'low')  prioChip = `<span class="font-mono text-xs px-2.5 py-1 rounded-lg" style="background:#f5f0e8;color:#a09a94">💤 Rendah</span>`;
  return dlChip + prioChip;
}

// ─── Render ───────────────────────────────
function render() {
  updateStats();
  const filtered = tasks.filter(t => {
    if (currentFilter === 'active')  return !t.done;
    if (currentFilter === 'done')    return t.done;
    if (currentFilter === 'overdue') return !t.done && t.deadline && daysLeft(t.deadline) < 0;
    if (currentFilter === 'high')    return t.priority === 'high' && !t.done;
    return true;
  });

  const list = document.getElementById('task-list');
  if (!filtered.length) {
    list.innerHTML = `
      <div class="bg-white rounded-2xl border py-16 text-center animate-fade-in" style="border-color:#ede8df">
        <div style="font-size:3rem" class="mb-3">📋</div>
        <div class="text-sm font-medium" style="color:#7a7470">Tidak ada tugas di sini</div>
        <div class="font-mono text-xs mt-1" style="color:#c4bfba">kosong nih~</div>
      </div>`;
    return;
  }
  list.innerHTML = filtered.map(t => cardHTML(t)).join('');
}

function cardHTML(t) {
  const dl = daysLeft(t.deadline);
  const isOverdue = !t.done && t.deadline && dl < 0;
  const isSoon    = !t.done && t.deadline && dl !== null && dl >= 0 && dl <= 2;
  const mc = getMkColor(t.matkul);
  let borderColor = '#ede8df';
  if (isOverdue) borderColor = '#fca5a5';
  else if (isSoon) borderColor = '#fcd34d';

  return `
  <div id="task-${t.id}" class="animate-slide-in bg-white rounded-2xl border transition-all duration-200"
    style="border-color:${borderColor};box-shadow:0 1px 4px rgba(0,0,0,0.05);opacity:${t.done?'0.6':'1'}">
    <div class="p-4 sm:p-5">
      <div class="flex items-start gap-3">
        <div class="pt-0.5 flex-shrink-0">
          <input type="checkbox" class="custom-check" data-id="${t.id}" ${t.done?'checked':''} />
        </div>
        <div class="flex-1 min-w-0">
          <div class="mb-1.5">
            <span class="mk-badge" style="background:${mc.bg};color:${mc.text}">
              <span style="width:6px;height:6px;border-radius:50%;background:${mc.dot};flex-shrink:0;display:inline-block"></span>
              ${esc(t.matkul)}
            </span>
          </div>
          <div class="task-name-text text-sm font-semibold leading-snug ${t.done?'text-done':''}" style="${t.done?'':'color:#1a1714'}">
            ${esc(t.name)}
          </div>
          <div class="task-chips flex flex-wrap gap-2 mt-2">${buildChips(t)}</div>
        </div>
        <button class="btn-delete flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center transition-all"
          data-id="${t.id}" title="Hapus" style="color:#c4bfba">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M1.5 1.5l10 10M11.5 1.5l-10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════

window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', {
    weekday:'short', day:'numeric', month:'short', year:'numeric'
  });

  // Enter key
  ['input-name','input-matkul','input-date'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
  });
  document.getElementById('login-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSubmitAuth();
  });
  document.getElementById('register-confirm').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSubmitAuth();
  });

  // Event delegation untuk task list
  const taskList = document.getElementById('task-list');
  taskList.addEventListener('change', e => {
    if (e.target.classList.contains('custom-check')) {
      const id = e.target.dataset.id;
      if (id) toggleDone(id);
    }
  });
  taskList.addEventListener('click', e => {
    const btn = e.target.closest('.btn-delete');
    if (btn?.dataset.id) deleteTask(btn.dataset.id);
  });
  taskList.addEventListener('mouseover', e => {
    const btn = e.target.closest('.btn-delete');
    if (btn) { btn.style.color='#e05252'; btn.style.background='#fee2e2'; }
  });
  taskList.addEventListener('mouseout', e => {
    const btn = e.target.closest('.btn-delete');
    if (btn) { btn.style.color='#c4bfba'; btn.style.background='transparent'; }
  });

  // Cek session yang masih ada
  const token = getToken();
  const username = getUsername();
  if (token && username) {
    try {
      // Verifikasi token masih valid di server
      await apiFetch('/api/auth/check');
      showApp(username);
      loadTasks();
      return;
    } catch {}
  }

  // Kalau tidak ada session / expired → tampilkan login
  clearSession();
  showLogin();

  // Auto-refresh setiap 30 detik
  setInterval(() => {
    if (getToken()) loadTasks();
  }, 30000);
});
</script>
